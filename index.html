<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Amala's Meds">
<title>Amala's Medicine Tracker</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e99;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --radius: 10px; --radius-lg: 14px;
    --green-bg: #EAF3DE; --green-border: #C0DD97; --green-text: #3B6D11; --green: #639922;
    --red-bg: #FCEBEB; --red-border: #F7C1C1; --red-text: #A32D2D; --red: #E24B4A;
    --amber-bg: #FAEEDA; --amber-border: #FAC775; --amber-text: #633806; --amber: #BA7517;
    --blue-bg: #E6F1FB; --blue-border: #B5D4F4; --blue-text: #185FA5;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f2f2f0; --text2: #aeaead; --text3: #6e6e6b;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --green-bg: #1a2e0f; --green-border: #2d5018; --green-text: #90c45a;
      --red-bg: #2d1515; --red-border: #5a2020; --red-text: #f08080;
      --amber-bg: #2d2010; --amber-border: #5a3a10; --amber-text: #f0b060;
      --blue-bg: #0f1f35; --blue-border: #1a3a60; --blue-text: #70aae0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; background: var(--bg3); min-height: 100vh; padding-bottom: 80px; }
  .header { background: var(--bg); padding: 16px 16px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 50; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .header-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .mode-pill { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 99px; border: none; cursor: pointer; font-family: var(--font); }
  .mode-pill.her { background: #FBEAF0; color: #993556; }
  .mode-pill.monitor { background: var(--bg2); color: var(--text2); }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 6px; gap: 3px; border: none; background: transparent; cursor: pointer; color: var(--text3); font-size: 10px; font-family: var(--font); }
  .nav-btn.active { color: #639922; }
  .nav-icon { font-size: 20px; line-height: 1; }
  .content { padding: 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--bg); border-radius: var(--radius); padding: 12px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 600; }
  .progress-wrap { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; }
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .progress-bar { background: var(--bg3); border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-fill { height: 8px; border-radius: 99px; background: var(--green); transition: width 0.4s ease; }
  .alert { border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; }
  .alert.warning { background: var(--amber-bg); border: 0.5px solid var(--amber-border); }
  .alert.success { background: var(--green-bg); border: 0.5px solid var(--green-border); }
  .alert.info { background: var(--blue-bg); border: 0.5px solid var(--blue-border); }
  .alert-icon { font-size: 16px; flex-shrink: 0; }
  .alert-text { font-size: 13px; line-height: 1.5; }
  .alert.warning .alert-text { color: var(--amber-text); }
  .alert.success .alert-text { color: var(--green-text); }
  .alert.info .alert-text { color: var(--blue-text); }

  /* Notification card */
  .notif-card { background: var(--bg); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px; border: 0.5px solid var(--border); }
  .notif-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .notif-card h3 { font-size: 14px; font-weight: 600; }
  .notif-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
  .notif-badge.on { background: var(--green-bg); color: var(--green-text); }
  .notif-badge.off { background: var(--bg2); color: var(--text3); }
  .notif-badge.blocked { background: var(--red-bg); color: var(--red-text); }
  .notif-card p { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 12px; }
  .notif-times { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .notif-chip { background: var(--bg2); border-radius: 99px; padding: 5px 10px; font-size: 12px; color: var(--text2); }
  .enable-btn { width: 100%; padding: 11px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity 0.15s; }
  .enable-btn:active { opacity: 0.85; }
  .enable-btn.secondary { background: var(--bg2); color: var(--text2); font-weight: 400; font-size: 13px; cursor: default; }
  .enable-btn.blocked { background: var(--red-bg); color: var(--red-text); font-weight: 400; font-size: 13px; cursor: default; }

  .slot-section { margin-bottom: 14px; }
  .slot-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 0 2px; }
  .slot-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .slot-name { font-size: 13px; font-weight: 600; }
  .slot-time { font-size: 12px; color: var(--text2); }
  .med-row { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; border: 0.5px solid var(--border); transition: transform 0.1s; cursor: pointer; }
  .med-row:active { transform: scale(0.98); }
  .med-row.taken { background: var(--green-bg); border-color: var(--green-border); }
  .med-row.missed { background: var(--red-bg); border-color: var(--red-border); }
  .med-row.sos-row { border-style: dashed; }
  .med-row.readonly { cursor: default; }
  .check-circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; color: white; }
  .med-row.taken .check-circle { background: var(--green); border-color: var(--green); }
  .med-row.missed .check-circle { background: var(--red); border-color: var(--red); }
  .med-body { flex: 1; min-width: 0; }
  .med-name { font-size: 14px; font-weight: 500; }
  .med-row.taken .med-name { color: var(--green-text); }
  .med-row.missed .med-name { color: var(--red-text); }
  .med-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .med-status { font-size: 11px; font-weight: 500; flex-shrink: 0; color: var(--text3); }
  .med-row.taken .med-status { color: var(--green); }
  .med-row.missed .med-status { color: var(--red); }
  .med-status.sos { color: var(--amber); }
  .history-card { background: var(--bg); border-radius: var(--radius-lg); overflow: hidden; }
  .history-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-bottom: 0.5px solid var(--border); }
  .history-row:last-child { border-bottom: none; }
  .history-date { min-width: 95px; font-size: 13px; font-weight: 500; }
  .history-bar-wrap { flex: 1; background: var(--bg3); border-radius: 99px; height: 6px; overflow: hidden; }
  .history-bar-fill { height: 6px; border-radius: 99px; }
  .history-count { font-size: 12px; color: var(--text2); min-width: 46px; text-align: right; }
  .rx-notice { background: var(--blue-bg); border: 0.5px solid var(--blue-border); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--blue-text); margin-bottom: 12px; line-height: 1.5; }
  .rx-card { background: var(--bg); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 8px; border: 0.5px solid var(--border); }
  .rx-num { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .rx-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .rx-comp { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .rx-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .rx-tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; }
  .tag-slot { background: var(--green-bg); color: var(--green-text); }
  .tag-note { background: var(--amber-bg); color: var(--amber-text); }
  .tag-sos { background: var(--red-bg); color: var(--red-text); }
  .tag-dose { background: var(--bg2); color: var(--text2); }
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--green); color: white; font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 99px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding: 0 2px; }
  .hint { font-size: 12px; color: var(--text3); text-align: center; padding: 8px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Amala's Medicines</div>
        <div class="header-sub" id="todayDate"></div>
      </div>
      <button class="mode-pill her" id="modeBtn" onclick="toggleMode()">Her view</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('today',this)"><span class="nav-icon">💊</span>Today</button>
    <button class="nav-btn" onclick="switchTab('history',this)"><span class="nav-icon">📊</span>History</button>
    <button class="nav-btn" onclick="switchTab('prescription',this)"><span class="nav-icon">📋</span>Rx</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const MEDICINES = [
  { id:1, name:'Esogastrin D Caps',     comp:'Domperidone 30mg + Esomeprazole 40mg',           dose:'1 capsule',        slots:['morning','night'], note:'15 min before food', sos:false },
  { id:2, name:'Clarinova 250mg',        comp:'Clarithromycin 250mg',                            dose:'1 tablet',         slots:['morning','night'], note:'After food',         sos:false },
  { id:3, name:'Rhinolyt-FX',            comp:'Montelukast 10mg + Fexofenadine 120mg',           dose:'1 tablet',         slots:['morning','night'], note:'After food',         sos:false },
  { id:4, name:'Lubrinase Nasal Spray',  comp:'Hydroxypropyl-Methylcellulose 1% W/V',            dose:'1 spray/nostril',  slots:['morning','night'], note:'Both nostrils',      sos:false },
  { id:5, name:'Flutiprl OX Nasal Spray',comp:'Fluticasone 27.5mcg + Oxymetazoline 50mcg',      dose:'1 spray/nostril',  slots:['morning','night'], note:'Both nostrils',      sos:false },
  { id:6, name:'Dolo 650mg',             comp:'Paracetamol 650mg',                               dose:'1 tablet',         slots:['morning','night'], note:'Only if fever/pain', sos:true  },
  { id:7, name:'Waxonil-M/C Ear Spray',  comp:'Ear spray',                                       dose:'2 sprays',         slots:['morning'],         note:'Right ear only',     sos:false }
];

const SLOTS = {
  morning: { label:'Morning', time:'8:00 AM', hour:8,  minute:0, color:'#EF9F27' },
  night:   { label:'Night',   time:'9:00 PM', hour:21, minute:0, color:'#7F77DD' }
};

// Reminders: on-time + 30-min follow-up for each slot
const REMINDERS = [
  { slot:'morning', hour:8,  minute:0,  title:'Morning medicines 💊', body:'Time to take your morning medicines.' },
  { slot:'morning', hour:8,  minute:30, title:'Morning reminder ⏰',   body:'Have you taken your morning medicines yet?' },
  { slot:'night',   hour:21, minute:0,  title:'Night medicines 💊',    body:'Time to take your night medicines.' },
  { slot:'night',   hour:21, minute:30, title:'Night reminder ⏰',     body:'Have you taken your night medicines yet?' },
];

let isHerView = true;
let currentTab = 'today';

function getState() { try { return JSON.parse(localStorage.getItem('amalaRx') || '{}'); } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem('amalaRx', JSON.stringify(s)); } catch(e) {} }
let state = getState();

function todayKey() { return new Date().toISOString().slice(0,10); }
function getStatus(medId, slot, dk) { return ((state[dk] || {})[medId+'_'+slot]) || null; }

function toggleDose(medId, slot) {
  if (!isHerView) return;
  const dk = todayKey();
  if (!state[dk]) state[dk] = {};
  const k = medId+'_'+slot;
  if (state[dk][k] && state[dk][k].status === 'taken') {
    delete state[dk][k];
  } else {
    const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    state[dk][k] = { status:'taken', time:t };
    showToast('Marked as taken ✓');
  }
  saveState(state);
  render();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function toggleMode() {
  isHerView = !isHerView;
  const btn = document.getElementById('modeBtn');
  btn.textContent = isHerView ? 'Her view' : 'Monitor view';
  btn.className = 'mode-pill ' + (isHerView ? 'her' : 'monitor');
  render();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Notifications ─────────────────────────────────────────────────────────────

async function requestNotifications() {
  if (!('Notification' in window)) { showToast('Not supported in this browser'); return; }
  const result = await Notification.requestPermission();
  if (result === 'granted') {
    showToast('Alerts enabled ✓');
    scheduleReminders();
  }
  render();
}

function scheduleReminders() {
  const now = new Date();
  REMINDERS.forEach(r => {
    const target = new Date();
    target.setHours(r.hour, r.minute, 0, 0);
    const delay = target - now;
    if (delay <= 0) return; // already past for today
    setTimeout(() => fireNotification(r), delay);
    // Also reschedule daily — simple 24h repeat
    setTimeout(() => {
      setInterval(() => fireNotification(r), 24 * 60 * 60 * 1000);
    }, delay);
  });
}

function fireNotification(r) {
  if (Notification.permission !== 'granted') return;
  const dk = todayKey();
  const slotMeds = MEDICINES.filter(m => m.slots.includes(r.slot) && !m.sos);
  const allTaken = slotMeds.every(m => { const s = getStatus(m.id, r.slot, dk); return s && s.status === 'taken'; });
  if (allTaken) return;
  const n = new Notification(r.title, { body: r.body, tag: 'med-' + r.slot + '-' + r.minute, renotify: true, requireInteraction: true });
  n.onclick = () => { window.focus(); n.close(); };
}

function initReminders() {
  if (Notification.permission === 'granted') scheduleReminders();
}

// ── Notification card ─────────────────────────────────────────────────────────

function renderNotifCard() {
  const supported = 'Notification' in window;
  const perm = supported ? Notification.permission : 'unsupported';

  let badge, btnHtml, desc;

  if (!supported) {
    badge = `<span class="notif-badge off">Not supported</span>`;
    desc = 'Open this file in Safari and add it to your home screen for notification support.';
    btnHtml = '';
  } else if (perm === 'granted') {
    badge = `<span class="notif-badge on">Active</span>`;
    desc = 'You\'ll be reminded at 8:00 AM and 9:00 PM. A follow-up fires 30 min later if medicines aren\'t marked.';
    btnHtml = `<button class="enable-btn secondary">✓ Alerts are on</button>`;
  } else if (perm === 'denied') {
    badge = `<span class="notif-badge blocked">Blocked</span>`;
    desc = 'Notifications are blocked. Go to Settings → Safari → Notifications and allow this site.';
    btnHtml = `<button class="enable-btn blocked">Blocked — fix in Settings</button>`;
  } else {
    badge = `<span class="notif-badge off">Off</span>`;
    desc = 'Tap below to get reminded when it\'s time to take medicines. A follow-up alert fires 30 min later if not marked.';
    btnHtml = `<button class="enable-btn" onclick="requestNotifications()">🔔 Enable medicine alerts</button>`;
  }

  return `<div class="notif-card">
    <div class="notif-card-header"><h3>Medicine alerts</h3>${badge}</div>
    <p>${desc}</p>
    <div class="notif-times">
      <span class="notif-chip">🌅 8:00 AM</span>
      <span class="notif-chip">⏰ 8:30 AM follow-up</span>
      <span class="notif-chip">🌙 9:00 PM</span>
      <span class="notif-chip">⏰ 9:30 PM follow-up</span>
    </div>
    ${btnHtml}
  </div>`;
}

// ── Today ─────────────────────────────────────────────────────────────────────

function renderToday() {
  const dk = todayKey();
  const now = new Date().getHours();
  let taken=0, missed=0, pending=0, total=0;

  MEDICINES.forEach(med => {
    if (med.sos) return;
    med.slots.forEach(slot => {
      total++;
      const s = getStatus(med.id, slot, dk);
      if (s && s.status==='taken') taken++;
      else if (SLOTS[slot].hour + 2 < now) missed++;
      else pending++;
    });
  });

  const pct = total ? Math.round((taken/total)*100) : 0;

  let alertHtml = '';
  if (missed > 0 && isHerView)
    alertHtml = `<div class="alert warning"><span class="alert-icon">⚠️</span><div class="alert-text"><strong>You missed ${missed} dose${missed>1?'s':''} today.</strong><br>Take them if it's not too late.</div></div>`;
  else if (missed > 0)
    alertHtml = `<div class="alert warning"><span class="alert-icon">⚠️</span><div class="alert-text"><strong>Amala missed ${missed} dose${missed>1?'s':''} today.</strong><br>Please check in with her.</div></div>`;
  else if (taken === total && total > 0)
    alertHtml = `<div class="alert success"><span class="alert-icon">🎉</span><div class="alert-text"><strong>All scheduled doses taken today!</strong><br>Great going, keep it up!</div></div>`;

  let scheduleHtml = '';
  Object.keys(SLOTS).forEach(slotKey => {
    const slot = SLOTS[slotKey];
    const medsInSlot = MEDICINES.filter(m => m.slots.includes(slotKey));
    if (!medsInSlot.length) return;
    scheduleHtml += `<div class="slot-section"><div class="slot-header"><div class="slot-dot" style="background:${slot.color}"></div><span class="slot-name">${slot.label}</span><span class="slot-time">${slot.time}</span></div>`;
    medsInSlot.forEach(med => {
      const s = getStatus(med.id, slotKey, dk);
      let cls='', statusText='', checkMark='';
      if (s && s.status==='taken') { cls='taken'; statusText='Taken '+s.time; checkMark='✓'; }
      else if (med.sos) { statusText='SOS'; }
      else if (SLOTS[slotKey].hour + 2 < now) { cls='missed'; statusText='Missed'; checkMark='✕'; }
      else { statusText='Pending'; }
      const ro = isHerView ? '' : ' readonly';
      const oc = isHerView ? `onclick="toggleDose(${med.id},'${slotKey}')"` : '';
      scheduleHtml += `<div class="med-row ${cls}${ro}${med.sos?' sos-row':''}" ${oc}>
        <div class="check-circle">${checkMark}</div>
        <div class="med-body"><div class="med-name">${med.name}</div><div class="med-detail">${med.dose} · ${med.note}</div></div>
        <div class="med-status${med.sos?' sos':''}">${statusText}</div>
      </div>`;
    });
    scheduleHtml += '</div>';
  });

  document.getElementById('mainContent').innerHTML = `
    ${renderNotifCard()}
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Taken</div><div class="stat-value" style="color:var(--green)">${taken}</div></div>
      <div class="stat-card"><div class="stat-label">Missed</div><div class="stat-value" style="color:var(--red)">${missed}</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:var(--amber)">${pending}</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta"><span>Today's progress</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${alertHtml}
    ${scheduleHtml}
    ${isHerView ? '<p class="hint">Tap a medicine to mark it as taken</p>' : ''}
  `;
}

// ── History ───────────────────────────────────────────────────────────────────

function renderHistory() {
  let rows = '';
  for (let i=0; i<15; i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const dk = d.toISOString().slice(0,10);
    let taken=0, total=0;
    MEDICINES.forEach(med => {
      if (med.sos) return;
      med.slots.forEach(slot => { total++; const s = getStatus(med.id, slot, dk); if (s && s.status==='taken') taken++; });
    });
    const pct = total ? Math.round((taken/total)*100) : 0;
    const color = pct===100 ? 'var(--green)' : pct>=50 ? 'var(--amber)' : i===0 ? 'var(--text3)' : 'var(--red)';
    const label = i===0 ? 'Today' : i===1 ? 'Yesterday' : d.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});
    rows += `<div class="history-row"><div class="history-date">${label}</div><div class="history-bar-wrap"><div class="history-bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="history-count">${taken}/${total}</div></div>`;
  }
  document.getElementById('mainContent').innerHTML = `<div class="section-title">15-day course</div><div class="history-card">${rows}</div>`;
}

// ── Prescription ──────────────────────────────────────────────────────────────

function renderPrescription() {
  let cards = '';
  MEDICINES.forEach((med,i) => {
    const slotTags = med.slots.map(s=>`<span class="rx-tag tag-slot">${SLOTS[s].label}</span>`).join('');
    cards += `<div class="rx-card">
      <div class="rx-num">Medicine ${i+1} of ${MEDICINES.length}</div>
      <div class="rx-name">${med.name}</div>
      <div class="rx-comp">${med.comp}</div>
      <div class="rx-tags">${slotTags}<span class="rx-tag tag-dose">${med.dose}</span><span class="rx-tag tag-note">${med.note}</span>${med.sos?'<span class="rx-tag tag-sos">SOS only</span>':''}</div>
    </div>`;
  });
  document.getElementById('mainContent').innerHTML = `
    <div class="rx-notice"><strong>Patient:</strong> Amala Thomas, 32y · <strong>Dr.</strong> Diptarka Bhattacharyya, ENT<br><strong>Prescribed:</strong> 13 Mar 2026 · <strong>Review:</strong> after 15 days</div>
    <div class="section-title">All medicines</div>${cards}`;
}

// ── Init ──────────────────────────────────────────────────────────────────────

function render() {
  if (currentTab === 'today') renderToday();
  else if (currentTab === 'history') renderHistory();
  else renderPrescription();
}

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
initReminders();
render();
</script>
</body>
</html>
